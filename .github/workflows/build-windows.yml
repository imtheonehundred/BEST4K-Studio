name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main
        run: npm run build

      - name: Decode signing certificate (if secret present)
        id: cert
        shell: pwsh
        run: |
          if ($env:WIN_CERT_PFX_BASE64) {
            $bytes = [Convert]::FromBase64String($env:WIN_CERT_PFX_BASE64)
            $path = "${{ runner.temp }}\code-sign.pfx"
            [IO.File]::WriteAllBytes($path, $bytes)
            "csc_link=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "::notice::Signing certificate loaded — installer will be signed."
          } else {
            Write-Host "::warning::No WIN_CERT_PFX_BASE64 secret set — installer will be UNSIGNED. Smart App Control will block it on Windows 11."
          }
        env:
          WIN_CERT_PFX_BASE64: ${{ secrets.WIN_CERT_PFX_BASE64 }}

      - name: Package NSIS installer + portable zip
        env:
          CSC_LINK: ${{ steps.cert.outputs.csc_link }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Tagged pushes publish to GitHub Releases (latest.yml for updater).
        # Other pushes/PRs only build artifacts.
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            npx electron-builder --win --x64 --publish always
          } else {
            npx electron-builder --win --x64 --publish never
          }
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BEST4K-Studio-Setup
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

      # Release publishing is handled by electron-builder's --publish flag
      # on tag pushes (it uploads .exe + .zip + latest.yml for the auto-updater).
